<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Annu Play</title>
    <!-- Favicon as per Saved Info -->
    <link rel="icon" type="image/png" href="icon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-gradient-to-br from-pink-50 to-purple-50 flex items-center justify-center min-h-screen">
    <div class="bg-white rounded-2xl shadow-2xl p-8 max-w-md w-full border-t-4 border-pink-500">
        <div class="text-center mb-6">
            <div class="w-20 h-20 bg-pink-100 rounded-full flex items-center justify-center mx-auto mb-4">
                <i class="fas fa-user-shield text-pink-500 text-3xl"></i>
            </div>
            <h2 class="text-3xl font-bold gradient-text">Admin Access</h2>
            <p class="text-gray-500 text-sm mt-2">Authorized Personnel Only</p>
        </div>

        <!-- Google Login Button -->
        <button id="googleLoginBtn" class="w-full flex items-center justify-center gap-3 bg-white border border-gray-300 py-3 rounded-xl font-semibold text-gray-700 hover:bg-gray-50 transition duration-300 shadow-sm">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/pwa/google.svg" width="20">
            Sign in with Google
        </button>

        <div id="loginMsg" class="mt-6 text-center font-bold text-sm min-h-[20px]"></div>
    </div>

    <!-- Logic Hub -->
    <script type="module" src="js/admin.js"></script>
</body>
</html>
